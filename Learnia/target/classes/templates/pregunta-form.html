<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nueva Pregunta</title>
</head>
<body>

<div class="container">
    <h1>Pregunta<br> Si Tienes Duda</h1>

    <h1 th:text="${modoEdicion} ? 'Editar Pregunta' : 'Nueva Pregunta'"></h1>

    <form th:action="${modoEdicion} ? @{/preguntas/actualizar/{id}(id=${pregunta.idPregunta})} : @{/preguntas/guardar}"
          th:object="${pregunta}"
          method="post">

        <input type="hidden" th:field="*{idPregunta}">

        <div class="campo">
            <label for="titulo">Pregunta</label>
            <textarea id="titulo" th:field="*{titulo}" placeholder="Si tienes duda, Pregunta Acá"></textarea>
            <div class="error"
                th:if="${#fields.hasErrors('titulo')}"
                th:errors="*{titulo}"></div>
        </div>

        <div class="campo">
            <label>Fecha de la Publicación</label>
            <input type="datetime-local" th:field="*{fechaPublicacion}">
            <div class="error"
                 th:if="${#fields.hasErrors('fechaPublicacion')}"
                 th:errors="*{fechaPublicacion}"></div>
        </div>

        <div class="campo">
            <select th:field="*{categoria.id}">
                <option value="">Seleccione categoría</option>
                <option th:each="c : ${categorias}"
                        th:value="${c.id}"
                        th:text="${c.nombre}">
                </option>
            </select>
        </div>

        <div class="acciones">
            <button type="submit"
                    class="btn btn-guardar"
                    th:text="${modoEdicion} ? 'Editar' : 'Guardar'">
                Preguntar
            </button>
        </div>
    </form>
</div>

    <footer class="footer">

        <div class="footer-left">
            <h2>LEARNIA</h2>
            <p>Transformando la manera en que los estudiantes colaboran y aprenden juntos.</p>
        </div>

        <div class="footer-grid">

            <div class="footer-col">
                <h3>Navegación</h3>
                <a href="#">Blog</a>
                <a href="#">Expertos</a>
                <a href="#">Padres</a>
            </div>

            <div class="footer-col">
                <h3>Soporte</h3>
                <a href="#">Ayuda</a>
                <a href="#">Privacidad</a>
                <a href="#">Términos</a>
            </div>

            <div class="footer-col">
                <h3>Contacto</h3>
                <a href="#">Email</a>
                <a href="#">Redes</a>
            </div>

        </div>

    </footer>

</body>

<style>
:root {
  --azul: #2C3E50;
  --naranja: #D35400;
  --verde: #27AE60;
  --cian: #2980B9;
  --amarillo: #F1C40F;
}

body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, var(--cian), var(--azul));
  color: white;
}

.container {
  width: 400px;
  margin: 50px auto;
  background: white;
  color: var(--azul);
  padding: 25px;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

h1 {
  text-align: center;
}

.campo {
  margin-bottom: 15px;
  display: flex;
  flex-direction: column;
}

.campo label {
  margin-bottom: 5px;
}

.campo textarea {
  min-height: 150px;
  max-height: 300px;
  resize: vertical;
  font-size: 14px;
}

.campo textarea,
.campo input,
.campo select {
  padding: 10px;
  border-radius: 5px;
  border: 1px solid #ccc;
}

/* Error */
.error {
  color: red;
  font-size: 12px;
}

.btn-guardar {
  width: 100%;
  background-color: var(--verde);
  color: white;
  padding: 10px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.btn-guardar:hover {
  background-color: #1e8449;
}

.footer {
  background-color: #1f2d3a;
  color: white;
  display: flex;
  justify-content: space-between;
  gap: 40px;
  padding: 50px 60px;
  margin-top: 60px;
  flex-wrap: wrap;
}

.footer-left {
  flex: 1;
  min-width: 250px;
}

.footer-left h2 {
  color: var(--cian);
  font-size: 26px;
  margin-bottom: 10px;
}

.footer-left p {
  color: #bdc3c7;
  max-width: 300px;
  line-height: 1.5;
}

.footer-grid {
  display: flex;
  gap: 60px;
  flex: 2;
  justify-content: flex-end;
  flex-wrap: wrap;
}

.footer-col {
  display: flex;
  flex-direction: column;
  min-width: 120px;
}

.footer-col h3 {
  color: var(--cian);
  margin-bottom: 12px;
  font-size: 16px;
}

.footer-col a {
  color: #bdc3c7;
  text-decoration: none;
  margin-bottom: 8px;
  transition: 0.2s;
}

.footer-col a:hover {
  color: var(--amarillo);
  transform: translateX(3px);
}
</style>

</html>
