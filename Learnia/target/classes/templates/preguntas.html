<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Preguntas</title>
</head>
<body>
    <div class="navbar">
        <div class="logo">
            <h1 class="titulo">Learnia</h1>
        </div>

            <ul class="nav-links">
                <li><a th:href="#">Inicio</a></li>
            </ul>

            <form th:action="@{/preguntas}" method="get" class="buscador">
                <input type="text" name="texto" placeholder="Buscar Pregunta">
                <select name="categoriaId">
                    <option value="">Todas las Categorias</option>
                    <option th:each="c : ${categorias}"
                            th:values="${c.id}"
                            th:text="${c.nombre}"></option>
                </select>
                <button type="submit" class="btn-buscar">Buscar</button>
            </form>
    </div>

    <div class="contenedor">
    </div>

    <div class="acciones">
        <a th:href="@{/preguntas/nuevo}" class="btn btn-nuevo">Nueva Pregunta</a>
    </div>

    <table>
        <thead>
            <tr>
                <th>Id</th>
                <th>Titulo</th>
                <th>Fecha de Publicación</th>
                <th>Usuario</th>
                <th>Id de Categoria</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="pregunta : ${preguntas}">
                <td th:text="${pregunta.idPregunta}"></td>
                <td th:text="${pregunta.titulo}"></td>
                <td th:text="${pregunta.fechaPublicacion}"></td>
                <td th:text="${pregunta.idUsuario}"></td>
                <td th:text="${pregunta.Categoria}"></td>
                <td>
                    <a th:href="@{/preguntas/editar/{id}(id=${pregunta.idPregunta})}" class="btn btn-editar">Editar</a>

                    <a th:href="@{/preguntas/editar/{id}(id=${pregunta.idPregunta})}"
                       onclick="return confirm('¿Seguro?')"
                       class="btn btn-eliminar">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>

    <footer class="footer">
        <div class="footer-left">
            <h2>LEARNIA</h2>
            <p>Transformando la manera en que los estudiantes colaboran y aprenden juntos.</p>
        </div>

        <div class="footer-col">
            <h3>Navegación</h3>
            <p>Blog</p>
            <p>Expertos</p>
            <p>Padres</p>
        </div>

        <div class="footer-col">
            <h3>Soporte</h3>
            <p>Ayuda</p>
            <p>Privacidad</p>
        </div>
    </footer>
</body>

<style>
:root {
  --azul: #2C3E50;
  --naranja: #D35400;
  --verde: #27AE60;
  --cian: #2980B9;
  --amarillo: #F1C40F;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, var(--cian), var(--azul));
  color: white;
}

.navbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: white;
  padding: 15px 40px;
  border-bottom: 1px solid #e6e6e6;
  gap: 20px;
}

.logo {
  flex: 1;
  display: flex;
  align-items: center;
}

.logo h1 {
  margin: 0;
  font-size: 26px;
  color: var(--azul);
}

.nav-links {
  flex: 1;
  display: flex;
  justify-content: center;
  list-style: none;
  margin: 0;
  padding: 0;
}

.nav-links li a {
  text-decoration: none;
  color: var(--azul);
  font-weight: 600;
}

.buscador {
  flex: 2;
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 10px;
}

.buscador input,
.buscador select {
  padding: 8px 12px;
  border-radius: 20px;
  border: 1px solid #ddd;
}

.btn-buscar {
  background-color: var(--cian);
  color: white;
  border: none;
  padding: 8px 14px;
  border-radius: 20px;
  cursor: pointer;
}

.btn-nuevo {
  background-color: var(--naranja);
  color: white !important;
  padding: 10px 16px;
  border-radius: 20px;
  font-weight: bold;
}

.contenedor {
  width: 90%;
  margin: auto;
  padding: 20px;
}

.titulo {
  text-align: left;
  margin-bottom: 20px;
}

.campo {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.campo textarea,
.campo select {
  padding: 8px;
  border: 1px solid #ccc;
  border-radius: 5px;
}

.btn-nuevo {
  background-color: var(--naranja);
  color: white;
  padding: 10px;
  text-decoration: none;
  border-radius: 5px;
}

.acciones {
  width: 90%;
  margin: 25px auto 15px auto;
  display: flex;
  justify-content: flex-start;
}

.btn-nuevo {
  background-color: var(--naranja);
  color: white;
  padding: 10px 18px;
  border-radius: 25px;
  font-weight: bold;
  text-decoration: none;
  box-shadow: 0 3px 8px rgba(0,0,0,0.15);
  transition: 0.2s;
}

.btn-nuevo:hover {
  transform: translateY(-2px);
}

table {
  width: 90%;
  margin: auto;
  border-collapse: collapse;
  background: white;
}

thead {
  background-color: var(--azul);
  color: white;
}

th, td {
  padding: 10px;
  border: 1px solid #ddd;
  text-align: center;
}

tbody tr:nth-child(even) {
  background-color: #f9f9f9;
}

tbody tr:hover {
  background-color: #d6eaf8;
}

.btn {
  padding: 5px 10px;
  border-radius: 5px;
  text-decoration: none;
  color: white;
}

.btn-editar {
  background-color: var(--cian);
}

.btn-buscar {
  background-color: var(--cian);
  color: white;
  border: none;
  padding: 8px 12px;
  border-radius: 5px;
  cursor: pointer;
}

.btn-buscar:hover {
  background-color: #1f6692;
}


.btn-eliminar {
  background-color: var(--naranja);
}

.buscador {
  display: flex;
  gap: 10px;
  align-items: center;
}

.buscador input,
.buscador select {
  padding: 8px;
  border-radius: 20px;
  border: 1px solid #ddd;
}

.btn-buscar {
  background-color: var(--cian);
  color: white;
  border: none;
  padding: 8px 14px;
  border-radius: 20px;
  cursor: pointer;
}

.footer {
  background-color: #2c3e50;
  color: white;
  display: flex;
  justify-content: space-around;
  padding: 40px;
  margin-top: 40px;
}

.footer-left h2 {
  color: var(--cian);
}

.footer-left p {
  max-width: 250px;
  color: #bdc3c7;
}

.footer-col h3 {
  margin-bottom: 10px;
  color: var(--cian);
}

.footer-col p {
  margin: 5px 0;
  color: #bdc3c7;
}
</style>

</html>
