<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learnia | Mi Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        deepBlue: '#2C3E50',
                        terracota: '#D35400',
                        natureGreen: '#27AE60',
                        eduCian: '#2980B9',
                        solarYellow: '#F1C40F'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 font-sans text-deepBlue antialiased">


<nav class="bg-white/80 backdrop-blur-md px-8 py-4 flex justify-between items-center sticky top-0 z-50 border-b border-slate-100 shadow-sm">
    <div class="flex items-center space-x-4">
        <div class="text-3xl font-black tracking-tighter text-deepBlue">
            LEAR<span class="text-eduCian">NIA</span>
        </div>
    </div>

    <div class="flex items-center space-x-6">
        <div class="flex items-center space-x-3">
            <a th:href="@{/usuario}">

                <img th:src="${usuario.fotoUsuario != null and !#strings.isEmpty(usuario.fotoUsuario) ? usuario.fotoUsuario : '/img/default-avatar.png'}"
                     class="w-9 h-9 rounded-xl object-cover border-2 border-slate-100"
                     alt="Perfil">
            </a>
            <span class="text-sm font-bold text-deepBlue hidden md:block" th:text="${usuario.nombreUsuario}">Nombre</span>
        </div>
        <form th:action="@{/logout}" method="post" class="inline">
            <button type="submit" class="text-slate-400 hover:text-terracota transition-colors">
                <i class="fa-solid fa-right-from-bracket text-lg"></i>
            </button>
        </form>
    </div>
</nav>

<main class="max-w-7xl mx-auto grid grid-cols-12 gap-8 p-8">


    <aside class="col-span-12 lg:col-span-2 space-y-6">
        <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest pl-2">Categorías</h2>
        <div class="flex lg:flex-col gap-2 overflow-x-auto pb-4">
            <a href="#" class="bg-eduCian text-white flex items-center space-x-3 p-3 px-5 rounded-2xl transition-all shadow-lg shadow-eduCian/20">
                <i class="fa-solid fa-layer-group text-sm"></i>
                <span class="text-sm font-bold">Todas</span>
            </a>


            <div th:each="cat : ${categorias}">
                <a href="#" class="flex items-center space-x-3 p-3 px-5 rounded-2xl text-slate-500 hover:bg-white hover:text-eduCian transition-all group">
                    <span class="text-sm font-bold group-hover:translate-x-1 transition-transform"
                          th:text="${cat.nombreCategoria}">Categoría</span>
                </a>
            </div>
        </div>
    </aside>


    <section class="col-span-12 lg:col-span-7 space-y-8">


        <div class="bg-deepBlue p-8 rounded-[2.5rem] relative overflow-hidden shadow-2xl text-white">
            <div class="relative z-10">
                <h1 class="text-3xl font-black mb-2">
                    Hola, <span class="text-solarYellow" th:text="${usuario.nombreUsuario}">Estudiante</span>
                </h1>
                <p class="text-slate-300 mb-6">¿Tienes alguna duda hoy?</p>
                <a th:href="@{/preguntar}" class="inline-block bg-terracota px-6 py-3 rounded-xl font-bold text-sm hover:scale-105 transition-transform uppercase tracking-wider shadow-lg">
                    <i class="fa-solid fa-plus mr-2"></i>Nueva Pregunta
                </a>
            </div>

            <div class="absolute -right-10 -bottom-10 w-64 h-64 bg-eduCian/20 rounded-full blur-3xl"></div>
        </div>


        <div class="space-y-4">
            <h3 class="font-black text-xl text-deepBlue px-2">Dudas de la comunidad</h3>


            <div th:if="${#lists.isEmpty(preguntas)}" class="bg-white p-12 rounded-[2.5rem] border-2 border-dashed border-slate-200 text-center">
                <i class="fa-solid fa-comments text-slate-200 text-5xl mb-4"></i>
                <p class="text-slate-400 font-bold">No hay preguntas publicadas aún. ¡Sé el primero!</p>
            </div>


            <div th:each="p : ${preguntas}" class="bg-white p-6 rounded-3xl border border-slate-100 hover:shadow-xl transition-all group">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 bg-eduCian/10 text-eduCian rounded-xl flex items-center justify-center">
                            <i class="fa-solid fa-graduation-cap"></i>
                        </div>
                        <div>
                            <h4 class="font-bold text-deepBlue group-hover:text-eduCian transition-colors" th:text="${p.titulo}">Título de la duda</h4>
                            <p class="text-[10px] text-slate-400 font-black uppercase" th:text="${p.fechaPublicacion}">FECHA</p>
                        </div>
                    </div>
                </div>

                <p class="text-slate-600 text-sm mb-6 line-clamp-2" th:text="${p.descripcion}">Descripción de la pregunta...</p>

                <div class="flex justify-end items-center">

                    <a th:href="@{/pregunta/{id}(id=${p.idPregunta})}" class="bg-natureGreen text-white px-6 py-2 rounded-xl text-xs font-black hover:bg-deepBlue transition-all shadow-md">
                        VER RESPUESTAS
                    </a>
                </div>
            </div>
        </div>
    </section>


    <aside class="col-span-12 lg:col-span-3">
        <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-xl text-center sticky top-24">
            <div class="mb-4 relative inline-block">

                <img th:src="${usuario.fotoUsuario != null and !#strings.isEmpty(usuario.fotoUsuario) ? usuario.fotoUsuario : '/img/default-avatar.png'}"
                     class="w-24 h-24 rounded-3xl mx-auto object-cover border-4 border-slate-50 shadow-md"
                     alt="Avatar">
                <div class="absolute -bottom-2 -right-2 bg-solarYellow w-8 h-8 rounded-lg flex items-center justify-center border-4 border-white">
                    <i class="fa-solid fa-star text-white text-[10px]"></i>
                </div>
            </div>

            <h2 class="text-xl font-black text-deepBlue" th:text="${usuario.nombreUsuario}">Usuario</h2>

            <p class="text-xs font-bold text-eduCian uppercase tracking-widest mb-6" th:text="${usuario.rolUsuario}">ROL</p>

            <div class="text-left space-y-3 pt-6 border-t border-slate-50">
                <div class="flex items-center space-x-3 text-slate-500">
                    <i class="fa-solid fa-envelope text-xs"></i>
                    <span class="text-xs font-medium truncate" th:text="${usuario.correoUsuario}">correo@ejemplo.com</span>
                </div>
            </div>

            <a th:href="@{/usuario}" class="block w-full mt-8 py-3 bg-slate-100 text-deepBlue rounded-xl font-bold text-xs hover:bg-deepBlue hover:text-white transition-all">
                Mi Perfil
            </a>
        </div>
    </aside>

</main>
</body>
</html>
