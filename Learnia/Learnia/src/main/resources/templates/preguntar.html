<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Learnia Feed</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --azul: #2C3E50;
            --naranja: #D35400;
            --verde: #27AE60;
            --cian: #2980B9;
            --amarillo: #F1C40F;
        }

        /* BASE */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(180deg, #eef2f7, #e6ebf2);
            color: var(--azul);
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 40px;
            background: linear-gradient(90deg, var(--azul), #34495e);
            color: white;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .logo {
            font-weight: 800;
            font-size: 20px;
        }

        .search {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        .search input {
            width: 60%;
            padding: 10px 15px;
            border-radius: 25px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.15);
            color: white;
        }

        .search input::placeholder {
            color: #dcdcdc;
        }

        /* BOTÓN */
        .btn {
            background: var(--naranja);
            border: none;
            color: white;
            padding: 10px 16px;
            border-radius: 18px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn:hover {
            background: #b84300;
        }

        /* LAYOUT */
        .container {
            display: grid;
            grid-template-columns: 220px 1fr 260px;
            gap: 25px;
            padding: 30px 50px;
        }

        /* SIDEBAR */
        .sidebar {
            background: #fff;
            border-left: 4px solid var(--cian);
            border-radius: 18px;
            padding: 20px;
        }

        .sidebar li {
            list-style: none;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
        }

        /* MAIN */
        .main {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* HERO */
        .hero {
            background: linear-gradient(135deg, var(--azul), #34495e);
            color: white;
            padding: 25px;
            border-radius: 20px;
        }

        /* POST */
        .post {
            background: #fff;
            border-radius: 16px;
            padding: 18px;
            border-left: 6px solid var(--cian);
        }

        /* PERFIL */
        .profile {
            background: #fff;
            border-radius: 18px;
            padding: 20px;
            text-align: center;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            z-index: 999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #fff;
            width: 400px;
            border-radius: 16px;
            padding: 20px;
        }
    </style>
</head>

<body>

<!-- MODAL -->
<div id="questionModal" class="modal">
    <div class="modal-content">
        <h2>Hacer una pregunta</h2>

        <form>
            <input type="text" placeholder="Título de la pregunta">
            <textarea placeholder="Describe tu duda..." rows="5"></textarea>

            <select>
                <option>Matemáticas</option>
                <option>Programación</option>
                <option>Física</option>
                <option>Química</option>
            </select>

            <button type="submit">Publicar pregunta</button>
        </form>
    </div>
</div>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">LEARNIA</div>

    <div class="search">
        <input type="text" placeholder="Busca una respuesta...">
    </div>

    <button class="btn" onclick="openModal()">Haz una pregunta</button>
</div>

<!-- LAYOUT -->
<div class="container">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h3>Categorías</h3>
        <ul>
            <li>Matemáticas</li>
            <li>Programación</li>
            <li>Física</li>
            <li>Química</li>
        </ul>
    </aside>

    <!-- MAIN -->
    <main class="main">

        <div class="hero">
            <h1>¿Qué quieres saber?</h1>
        </div>

        <div class="post">
            <h3>Mi primera pregunta</h3>
            <p>¿Cómo se resuelve una fracción?</p>
        </div>

    </main>

    <!-- PERFIL -->
    <aside class="profile">
        <h4>usuario123</h4>
        <p>⭐ 90 pts</p>
    </aside>

</div>

<script>
    function openModal() {
        document.getElementById("questionModal").style.display = "flex";
    }
</script>

</body>
</html>
