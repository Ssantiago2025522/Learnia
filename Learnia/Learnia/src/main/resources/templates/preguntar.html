<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learnia | Hacer pregunta</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        deepBlue: '#2C3E50',
                        terracota: '#D35400',
                        natureGreen: '#27AE60',
                        eduCian: '#2980B9',
                        solarYellow: '#F1C40F'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f8fafc; }
    </style>
</head>
<body class="font-sans text-deepBlue bg-gray-50">

<nav class="bg-white px-8 py-4 border-b shadow-sm flex justify-between items-center">
    <div class="text-2xl font-black">LEAR<span class="text-eduCian">NIA</span></div>
    <a th:href="@{/menu}" class="text-sm font-bold text-gray-500 hover:text-eduCian transition-colors">← Volver al menú</a>
</nav>

<main class="max-w-3xl mx-auto p-8">

    <div class="bg-white p-8 rounded-3xl shadow-lg border border-gray-200">

        <h1 class="text-2xl font-black mb-2">Publicar una pregunta</h1>
        <p class="text-gray-500 text-sm mb-6">Tu pregunta será visible en la comunidad de Learnia.</p>

        <!-- Mensaje de error global si existe -->
        <div th:if="${error}" class="mb-4 p-4 bg-red-50 border border-red-200 rounded-xl text-red-600 text-sm font-medium"
             th:text="${error}">
        </div>

        <form th:action="@{/preguntar}" th:object="${preguntaDTO}" method="post" class="space-y-6">

            <div>
                <label class="text-sm font-bold">Título <span class="text-red-400">*</span></label>
                <input type="text" th:field="*{titulo}"
                       class="w-full mt-2 p-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-eduCian focus:border-transparent"
                       placeholder="Escribe tu pregunta (mínimo 15 caracteres)" required minlength="15">
            </div>

            <div>
                <label class="text-sm font-bold">Descripción <span class="text-red-400">*</span></label>
                <textarea th:field="*{descripcion}"
                          rows="6"
                          class="w-full mt-2 p-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-eduCian focus:border-transparent"
                          placeholder="Explica tu duda con detalle (mínimo 20 caracteres)" required minlength="20"></textarea>
            </div>

            <div>
                <label class="text-sm font-bold">Categoría <span class="text-red-400">*</span></label>
                <select th:field="*{idCategoria}" class="w-full mt-2 p-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-eduCian focus:border-transparent bg-white" required>
                    <option value="" disabled selected>Selecciona una categoría</option>
                    <!-- Categorías cargadas dinámicamente desde la base de datos -->
                    <option th:each="cat : ${categorias}"
                            th:value="${cat.idCategoria}"
                            th:text="${cat.nombreCategoria}">
                    </option>
                </select>
            </div>

            <div>
                <button type="submit"
                        class="w-full bg-terracota text-white py-3 rounded-2xl font-bold hover:bg-orange-600 transition-colors shadow-md hover:shadow-lg active:scale-95">
                    Publicar pregunta
                </button>
            </div>

        </form>
    </div>

</main>

</body>
</html>
