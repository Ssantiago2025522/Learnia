<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responder duda</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                deepBlue: '#2C3E50',
                terracota: '#D35400',
                natureGreen: '#27AE60',
                eduCian: '#2980B9',
                solarYellow: '#F1C40F'
              }
            }
          }
        }
    </script>
</head>

<body class="bg-slate-50 text-deepBlue font-sans">

<header class="bg-white px-6 py-4 flex items-center justify-between shadow-sm border-b">
    <div class="flex items-center gap-4">
        <button onclick="history.back()" class="w-10 h-10 flex items-center justify-center rounded-xl border hover:bg-slate-100 transition">
            <i class="fa-solid fa-arrow-left"></i>
        </button>

        <h1 class="font-black text-lg">Responder duda</h1>
    </div>

    <button class="bg-terracota text-white px-5 py-2 rounded-xl font-bold text-sm hover:scale-105 transition">
        Añadir Respuesta
    </button>
</header>

<main class="max-w-5xl mx-auto p-6 grid md:grid-cols-2 gap-6">

    <div class="bg-white p-6 rounded-2xl shadow-sm border">
        <h2 class="text-sm font-black text-eduCian mb-3 uppercase tracking-wide">Tarea</h2>

        <p class="text-slate-600 leading-relaxed font-medium">
            Explique qué entiendes por <span class="bg-solarYellow px-1 rounded">contabilidad</span> y qué entiendes por activo, pasivo y gastos.
        </p>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow-sm border flex flex-col">

        <h2 class="text-sm font-black text-eduCian mb-3 uppercase tracking-wide">Explicación</h2>

        <textarea
                class="w-full h-52 p-4 rounded-xl border outline-none focus:border-eduCian resize-none"
                placeholder="Escribe tu explicación aquí..."></textarea>

        <div class="flex gap-2 mt-4">
            <button class="px-3 py-1 bg-deepBlue text-white rounded-md text-sm">B</button>
            <button class="px-3 py-1 bg-deepBlue text-white rounded-md text-sm">I</button>
            <button class="px-3 py-1 bg-deepBlue text-white rounded-md text-sm">U</button>
        </div>

        <p class="text-natureGreen text-sm mt-3 font-bold">✔ Listo para enviar</p>

    </div>

</main>

</body>
</html>
