<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learnia | Home</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        deepBlue: '#2C3E50',
                        terracota: '#D35400',
                        natureGreen: '#27AE60',
                        eduCian: '#2980B9',
                        solarYellow: '#F1C40F'
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-slate-50 font-sans text-deepBlue">

<!-- NAV -->
<nav class="bg-white px-8 py-4 flex justify-between items-center shadow-sm border-b">

    <div class="text-2xl font-black">
        LEAR<span class="text-eduCian">NIA</span>
    </div>

    <div class="flex items-center space-x-4">

        <span class="font-bold text-sm"
              th:text="${usuario.nombreUsuario}">
            Usuario
        </span>

        <img th:src="${usuario.fotoUsuario != null ? usuario.fotoUsuario : '/img/default-avatar.png'}"
             class="w-9 h-9 rounded-xl">

        <a th:href="@{/preguntar}"
           class="bg-terracota text-white px-4 py-2 rounded-xl font-bold text-sm">
            Preguntar
        </a>

    </div>
</nav>

<!-- MAIN -->
<main class="max-w-5xl mx-auto p-6">

    <!-- HEADER -->
    <div class="bg-deepBlue text-white p-8 rounded-3xl mb-8">
        <h1 class="text-2xl font-black">
            Hola, <span class="text-solarYellow" th:text="${usuario.nombreUsuario}"></span>
        </h1>
        <p class="text-slate-300 mt-2">Explora y resuelve dudas</p>
    </div>

    <!-- LISTA DE PREGUNTAS -->
    <div class="space-y-5">

        <div th:if="${#lists.isEmpty(preguntas)}"
             class="text-center text-slate-400 font-bold">
            No hay preguntas aún
        </div>

        <div th:each="p : ${preguntas}"
             class="bg-white p-6 rounded-2xl shadow-sm border">

            <!-- materia -->
            <div class="text-xs font-bold text-eduCian mb-2"
                 th:text="${p.materia}">
                MATERIA
            </div>

            <!-- titulo -->
            <h2 class="text-lg font-black mb-2"
                th:text="${p.titulo}">
                Titulo
            </h2>

            <!-- descripcion -->
            <p class="text-slate-600"
               th:text="${p.descripcion}">
                descripcion
            </p>

        </div>

    </div>

</main>

</body>
</html>
