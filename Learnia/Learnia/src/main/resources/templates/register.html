<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro</title>

    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #2C3E50;
            color: #FFFFFF;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background-color: #34495E;
            padding: 40px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border-top: 4px solid #F1C40F;
        }

        h2 {
            margin-top: 0;
            color: #F1C40F;
            text-align: center;
            font-size: 24px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            border: 2px solid #2980B9;
            background: #ECF0F1;
            color: #2C3E50;
            box-sizing: border-box;
            outline: none;
        }

        input:focus {
            border-color: #F1C40F;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #D35400;
            color: white;
            border: none;
            border-radius: 6px;
            margin-top: 15px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #A04000;
        }

        .error {
            color: #E74C3C;
            font-size: 12px;
            margin: 0;
        }

        .success {
            color: #27AE60;
            text-align: center;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>

<body>
<div class="card">
    <h2>Crear cuenta</h2>
    <form th:action="@{/register}" th:object="${user}" method="post">
        <input type="text" th:field="*{nombreUsuario}" placeholder="Nombre">
        <p class="error" th:if="${#fields.hasErrors('nombreUsuario')}" th:errors="*{nombreUsuario}"></p>

        <input type="text" th:field="*{apellidoUsuario}" placeholder="Apellido">
        <p class="error" th:if="${#fields.hasErrors('apellidoUsuario')}" th:errors="*{apellidoUsuario}"></p>

        <input type="text" th:field="*{correoUsuario}" placeholder="Correo">
        <p class="error" th:if="${#fields.hasErrors('correoUsuario')}" th:errors="*{correoUsuario}"></p>

        <input type="password" th:field="*{contrasenaUsuario}" placeholder="Contraseña">
        <p class="error" th:if="${#fields.hasErrors('contrasenaUsuario')}" th:errors="*{contrasenaUsuario}"></p>

        <label for="foto" style="display:block; margin-top:10px; color:#2980B9; font-size:14px;">Foto de perfil</label>
        <input type="file" name="imagenFile" id="foto" accept="image/*" style="background: transparent; border: 1px dashed #2980B9; color: white;">

        <button type="submit">Registrarse</button>
    </form>

    <p class="success" th:if="${success}" th:text="${success}"></p>
    <p class="error" th:if="${error}" th:text="${error}" style="text-align: center; margin-top: 10px;"></p>
</div>
</body>
</html>
